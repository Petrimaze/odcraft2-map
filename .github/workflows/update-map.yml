name: Обновить карту

on:
  schedule:
    - cron: "0 */6 * * *"   # каждые 6 часов
  workflow_dispatch:          # и вручную кнопкой

# Права для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать два деплоя разом
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Собрать сайт карты (выкачка тайлов + границы городов)
        env:
          EXAROTON_TOKEN: ${{ secrets.EXAROTON_TOKEN }}
        run: bash scripts/build-site.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
